<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />

    <link href="/tamil/static/gen/style.css" rel="stylesheet">

    <script src="/tamil/static/main.js"></script>
    
  </head>
  <body class="min-h-screen dark:bg-gray-900 dark:text-white">
    <header class="bg-linear-to-r from-emerald-600 to-emerald-800 text-white shadow-lg">
      <nav class="flex justify-between shadow-md">
        <a class="block p-4 hover:underline text-2xl font-bold" href="/tamil/">தமிழ்</a>
        <div class="flex items-center text-sm">
          
          <a class="block p-2 hover:underline" href="/tamil/sounds/">Sounds</a>
          <a class="block p-2 hover:underline" href="/tamil/grammar/">Grammar</a>
          <a class="block p-2 hover:underline" href="/tamil/words/">Words</a>
          
          
        </div>
      </nav>

<article class="px-4 mt-24 mx-auto max-w-6xl">

<header class="my-4">
  <h1 class="font-bold text-3xl">
    <a href="/tamil/words/" class="hover:underline">Tamil words</a>
    <span class="font-medium text-slate-400">&rarr; irregular</span>
  </h1>
  
</header>

<p class="text-sm my-2">Showing 4 entries.</p>

<script type="text/javascript">
const ENTRIES = [{"id": 1782, "key_formal": "\u0b87\u0bb0\u0bc1", "informal_text": "iru", "meta_text": "verb (irundu, irukka) (intrans.)", "meta_url": "/tamil/verbs/%E0%AE%87%E0%AE%B0%E0%AF%81,v7-i/", "frequency": 16171, "definition": "be, stay", "order": null, "tags": [{"name": "irregular", "url": "/tamil/tags/irregular/"}]}, {"id": 1869, "key_formal": "\u0b9a\u0bbe", "informal_text": "s\u0101", "meta_text": "verb (settu, s\u0101ga)", "meta_url": "/tamil/verbs/%E0%AE%9A%E0%AE%BE,v1/", "frequency": 317, "definition": "die", "order": null, "tags": [{"name": "irregular", "url": "/tamil/tags/irregular/"}]}, {"id": 385, "key_formal": "\u0baa\u0bcb", "informal_text": "p\u014d", "meta_text": "verb (p\u014dyi, p\u014dga)", "meta_url": "/tamil/verbs/%E0%AE%AA%E0%AF%8B,v3/", "frequency": 7954, "definition": "go", "order": null, "tags": [{"name": "verbs:motion", "url": "/tamil/tags/verbs:motion/"}, {"name": "irregular", "url": "/tamil/tags/irregular/"}]}, {"id": 384, "key_formal": "\u0bb5\u0bbe", "informal_text": "v\u0101", "meta_text": "verb (vandu, vara)", "meta_url": "/tamil/verbs/%E0%AE%B5%E0%AE%BE,v2/", "frequency": 6938, "definition": "come", "order": null, "tags": [{"name": "verbs:motion", "url": "/tamil/tags/verbs:motion/"}, {"name": "irregular", "url": "/tamil/tags/irregular/"}]}];
</script>

<table x-data="wordsTable" class="w-table">
  <thead>
    <tr class="text-left bg-slate-100 dark:bg-slate-800 uppercase text-slate-500 dark:text-white text-xs">
      <th @click.prevent="sortBy('entry')" class="cursor-pointer p-4 font-medium">Entry</th>
      <th @click.prevent="sortBy('definition')" class="cursor-pointer font-medium">Simple meaning</th>
      <th @click.prevent="sortBy('frequency')" class="cursor-pointer font-medium text-right p-4">Frequency</th>
    </tr>
  </thead>

  <tbody>
    <template x-for="entry in sortedEntries" :key="entry.id">
      <tr class="even:bg-slate-50 dark:even:bg-slate-800">
        <td class="p-4">
          <span>
            <span class="w-entry" x-text="entry.informal_text"></span>
            <a class="block text-blue-500 hover:underline"
              :href="'https://ta.wiktionary.org/wiki/' + entry.key_formal"
              x-text="entry.key_formal"></a>
          </span>
        </td>
        <td class="py-2">
          <p class="mb-2 definition" x-html="entry.definition"></p>

          <template x-if="entry.meta || entry.tags">
            <p>
              <template x-if="entry.meta_text">
                <span class="w-meta">
                  <a :href="entry.meta_url" x-text="entry.meta_text"></a>
                </span>
              </template>
              <template x-for="tag in entry.tags">
                <a class="w-tag" :href="tag.url" x-text="tag.name"></a>
              </template>
            </p>
          </template>
        </td>
        <td class="text-right pr-4 text-xs">
          <template x-if="entry.frequency > 0">
            <span x-text="entry.order"></span>
          </template>
          <template x-if="entry.frequency == 0">
            <span>(?)</span>
          </template>
        </td>
      </tr>
    </template>
  </tbody>
</table>


</article>


    <footer class="sticky top-[100vh] bg-slate-700 text-white p-4 mt-24">
      &copy; 2025
    </footer>
  </body>
</html>
