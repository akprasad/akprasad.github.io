<table x-data="wordsTable" class="w-table">
  <thead>
    <tr class="text-left bg-slate-100 dark:bg-slate-800 uppercase text-slate-500 dark:text-white text-xs">
      <th @click.prevent="sortBy('entry')" class="cursor-pointer p-4 font-medium">Entry</th>
      <th @click.prevent="sortBy('definition')" class="cursor-pointer font-medium">Simple meaning</th>
      <th @click.prevent="sortBy('frequency')" class="cursor-pointer font-medium text-right p-4">Frequency</th>
    </tr>
  </thead>

  <tbody>
    <template x-for="entry in sortedEntries" :key="entry.id">
      <tr class="even:bg-slate-50 dark:even:bg-slate-800">

          <span>
            <span class="w-entry" x-text="entry.informal_text"></span>
            <a class="block text-blue-500 hover:underline"
              :href="'https://ta.wiktionary.org/wiki/' + entry.key_formal"
              x-text="entry.key_formal"></a>
          </span>
        </td>
        <td class="py-2">
          <p class="mb-2 definition" x-html="entry.definition"></p>

          <template x-if="entry.meta || entry.tags">
            <p>
              <template x-if="entry.meta_text">
                <span class="w-meta">
                  <a :href="entry.meta_url" x-text="entry.meta_text"></a>
                </span>
              </template>
              <template x-for="tag in entry.tags">
                <a class="w-tag" :href="tag.url" x-text="tag.name"></a>
              </template>
            </p>
          </template>
        </td>
        <td class="text-right pr-4 text-xs">
          <template x-if="entry.frequency > 0">
            <span x-text="entry.order"></span>
          </template>
          <template x-if="entry.frequency == 0">
            <span>(?)</span>
          </template>
        </td>
      </tr>
    </template>
  </tbody>
